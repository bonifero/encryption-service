name: crypto-java

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crypto_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crypto_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./crypto
    environment:
      CRYPTO_KEYSTORE_PASSWORD: ${CRYPTO_KEYSTORE_PASSWORD:?укажите CRYPTO_KEYSTORE_PASSWORD в .env}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-crypto_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - keystore-data:/app/keystore
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend

  nginx:
    build:
      context: ./nginx
    environment:
      ENABLE_HTTPS: ${ENABLE_HTTPS:-false}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend

volumes:
  db-data:
  keystore-data:
  nginx-certs:
